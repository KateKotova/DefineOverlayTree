name: Debug Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: List files (для диагностики)
      run: dir /s /b
    
    - name: Find .sln files
      run: dir *.sln /s /b
    
    - name: Find .csproj files
      run: dir *.csproj /s /b
    
    - name: Try to build
      run: |
        # Попробуем найти первый .sln файл и собрать его
        $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($slnFile) {
          Write-Host "Building $($slnFile.FullName)"
          msbuild $slnFile.FullName /p:Configuration=Debug /p:Platform="Any CPU"
        } else {
          Write-Host "No .sln file found, looking for .csproj"
          $csprojFile = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
          if ($csprojFile) {
            Write-Host "Building $($csprojFile.FullName)"
            msbuild $csprojFile.FullName /p:Configuration=Debug /p:Platform="Any CPU"
          } else {
            Write-Error "No solution or project file found"
            exit 1
          }
        }
