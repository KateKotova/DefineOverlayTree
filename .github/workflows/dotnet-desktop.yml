name: Build WPF App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # ИЗМЕНЕНО: Используем windows-2019 вместо windows-latest
    runs-on: windows-2019
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    # Шаг установки .NET Framework 4.6.1 БОЛЬШЕ НЕ НУЖЕН
    
    # Восстановление NuGet пакетов
    - name: Restore NuGet packages
      run: nuget restore "DefineOverlayTree.sln"
    
    # Сборка решения
    - name: Build solution
      run: |
        msbuild "DefineOverlayTree.sln" /p:Configuration=Release /p:Platform="Any CPU"
    
    # Загрузка артефактов
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WPF-App-Release
        path: |
          **/bin/Release/**/*.exe
          **/bin/Release/**/*.dll
          **/bin/Release/**/*.config
          **/bin/Release/**/*.pdb
        if-no-files-found: warn
