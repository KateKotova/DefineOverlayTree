name: Build .NET Framework WPF App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x86, x64, "Any CPU"]
    
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # Добавляем MSBuild в PATH
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    # Устанавливаем NuGet
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    # Восстанавливаем NuGet пакеты
    - name: Restore NuGet packages
      run: nuget restore DefineOverlayTree.sln
    
    # Сборка проекта
    - name: Build the application
      run: msbuild YourSolutionName.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="${{ matrix.platform }}" /p:TargetFrameworkVersion=v4.5
    
    # Поиск и загрузка собранных файлов
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WPF-App-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          **/bin/${{ matrix.configuration }}/**/*.exe
          **/bin/${{ matrix.configuration }}/**/*.dll
          **/bin/${{ matrix.configuration }}/**/*.config
          **/bin/${{ matrix.configuration }}/**/*.pdb
        if-no-files-found: warn
