name: Build WPF .NET Framework

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    runs-on: windows-latest
    
    env:
      SOLUTION_PATH: 'DefineOverlayTree.sln'
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # Для .NET Framework 4.5 не нужен setup-dotnet, но нужен MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    # Восстановление NuGet пакетов
    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_PATH }}
    
    # Сборка проекта
    - name: Build the application
      run: msbuild ${{ env.SOLUTION_PATH }} /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU"
    
    # Опционально: запуск тестов (если есть)
    # - name: Run tests
    #  run: vstest.console.exe .\YourTestProject\bin\${{ matrix.configuration }}\YourTestProject.dll
    
    # Загрузка артефактов сборки
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WPF-App-${{ matrix.configuration }}
        path: |
          **/bin/${{ matrix.configuration }}/**/*.exe
          **/bin/${{ matrix.configuration }}/**/*.dll
        if-no-files-found: warn
