name: Build WPF App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Find solution file
      run: |
        $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($slnFile) {
          Write-Host "Found solution: $($slnFile.FullName)"
          echo "SOLUTION_FILE=$($slnFile.FullName)" >> $env:GITHUB_ENV
        } else {
          Write-Host "No solution file found"
        }
    
    - name: Restore NuGet packages
      run: |
        if (Test-Path env:SOLUTION_FILE) {
          nuget restore $env:SOLUTION_FILE
        } else {
          Get-ChildItem -Filter packages.config -Recurse | ForEach-Object {
            nuget restore $_.FullName -PackagesDirectory packages
          }
        }
    
    - name: Build with solution
      if: env.SOLUTION_FILE != ''
      run: msbuild $env:SOLUTION_FILE /p:Configuration=Release /p:Platform="Any CPU"
    
    - name: Build without solution (fallback)
      if: env.SOLUTION_FILE == ''
      run: |
        $csprojFile = "DefineOverlayTree\DefineOverlayTree.csproj"
        msbuild $csprojFile /p:Configuration=Release /p:Platform="Any CPU" /p:OutputPath=bin\Release\
